<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>commit-report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .heatmap-cell { rx: 2; ry: 2; }
    .chart-tooltip {
      position: absolute;
      padding: 6px 10px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .dark .chart-tooltip { background: rgba(255,255,255,0.9); color: #1e293b; }
    /* 高级分析 Tab 样式 - 优化版 (Pill Style) */
    .advanced-tabs-nav {
      display: flex;
      gap: 0.5rem;
      padding: 0.375rem;
      background: #f1f5f9;
      border-radius: 0.75rem;
      overflow-x: auto;
      scrollbar-width: none; /* Firefox */
    }
    .advanced-tabs-nav::-webkit-scrollbar {
      display: none; /* Chrome/Safari */
    }
    .dark .advanced-tabs-nav {
      background: #1e293b;
    }
    .advanced-tab {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 0.5rem;
      font-weight: 500;
      font-size: 0.875rem;
      color: #64748b;
      transition: all 0.2s;
      white-space: nowrap;
      cursor: pointer;
      border: none;
      background: transparent;
      flex-shrink: 0;
    }
    .dark .advanced-tab {
      color: #94a3b8;
    }
    .advanced-tab:hover {
      color: #0f172a;
      background: rgba(255, 255, 255, 0.5);
    }
    .dark .advanced-tab:hover {
      color: #f8fafc;
      background: rgba(255, 255, 255, 0.05);
    }
    .advanced-tab.active {
      background: #fff;
      color: #0ea5e9;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
    }
    .dark .advanced-tab.active {
      background: #334155;
      color: #38bdf8;
      box-shadow: none;
    }
    .advanced-tab svg {
      width: 1.125rem;
      height: 1.125rem;
    }
    .advanced-tab-content.hidden {
      display: none;
    }
    /* 模块卡片动画 */
    .fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 min-h-screen transition-colors duration-300">
  <!-- 数据注入占位 -->
  <script>const DATA = __REPORT_DATA__;</script>

  <div class="max-w-7xl mx-auto px-4 py-8">
    __REPORT_SECTIONS__

    <!-- Footer -->
    <footer class="text-center text-sm text-slate-400 dark:text-slate-500 py-4">
      <div class="mb-2">
        由 <span class="text-primary-500 font-medium">commit-report</span> 生成于 <span id="generated-at"></span>
      </div>
      <div>
        <a href="https://github.com/qqzhangyanhua/commitx"
           target="_blank"
           rel="noopener noreferrer"
           class="inline-flex items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"
           title="View on GitHub">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
          </svg>
        </a>
      </div>
    </footer>
  </div>

  <!-- Tooltip -->
  <div class="chart-tooltip" id="tooltip"></div>

  __REPORT_SCRIPT__
</body>
</html>
